profile_name: local-opensearch
provider_mode: native
base_url: "${GATECO_BASE_URL:-http://localhost:8000}"

credentials:
  email: "${GATECO_EMAIL:-admin@acmecorp.com}"
  password: "${GATECO_PASSWORD:-password123}"

connector:
  type: opensearch
  config:
    host: "${OPENSEARCH_HOST:-localhost}"
    port: 9200
    api_key: "${OPENSEARCH_API_KEY:-}"

features:
  auth: true
  connectors: true
  ingestion: false
  retroactive: true
  policies: true
  retrievals: true
  metadata_resolution: true
  simulator: true
  audit: true
  dashboard: true
  billing: true

output_dir: ".validation_harness/output"
resource_prefix: "vh-"
