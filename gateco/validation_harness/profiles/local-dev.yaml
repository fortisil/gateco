profile_name: local-dev
base_url: "${GATECO_BASE_URL:-http://localhost:8000}"
credentials:
  email: "${GATECO_EMAIL:-admin@acmecorp.com}"
  password: "${GATECO_PASSWORD:-password123}"
connector:
  type: pgvector
  config:
    host: "${PGVECTOR_HOST:-localhost}"
    port: 5432
    database: "${PGVECTOR_DATABASE:-gateco_db}"
    user: "${PGVECTOR_USER:-postgres}"
    password: "${PGVECTOR_PASSWORD:-postgres}"
    schema: "public"
features:
  auth: true
  connectors: true
  ingestion: true
  retroactive: true
  policies: true
  retrievals: true
  metadata_resolution: true
  simulator: true
  audit: true
  dashboard: true
  billing: true
output_dir: ".validation_harness/output"
resource_prefix: "vh-"
