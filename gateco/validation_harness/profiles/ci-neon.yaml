profile_name: ci-neon
provider_mode: emulated_local_postgres
base_url: "${GATECO_BASE_URL:-http://localhost:8000}"

credentials:
  email: "${GATECO_EMAIL:-admin@acmecorp.com}"
  password: "${GATECO_PASSWORD:-password123}"

connector:
  type: neon
  config:
    connection_string: "postgresql://${NEON_USER:-test}:${NEON_PASSWORD:-test}@${NEON_HOST:-localhost}:5432/${NEON_DATABASE:-gateco_test}"

features:
  auth: true
  connectors: true
  ingestion: true
  retroactive: true
  policies: true
  retrievals: true
  metadata_resolution: true
  simulator: true
  audit: true
  dashboard: true
  billing: true
  identity_providers: true

identity_provider:
  type: okta
  config:
    domain: "vh-test.okta.com"
    api_token: "vh-fake-token"

output_dir: ".validation_harness/output"
resource_prefix: "vh-ci-"
