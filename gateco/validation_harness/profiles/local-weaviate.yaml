profile_name: local-weaviate
provider_mode: native
base_url: "${GATECO_BASE_URL:-http://localhost:8000}"

credentials:
  email: "${GATECO_EMAIL:-admin@acmecorp.com}"
  password: "${GATECO_PASSWORD:-password123}"

connector:
  type: weaviate
  config:
    host: "${WEAVIATE_HOST:-localhost}"
    port: 8080
    api_key: "${WEAVIATE_API_KEY:-}"

features:
  auth: true
  connectors: true
  ingestion: false
  retroactive: true
  policies: true
  retrievals: true
  metadata_resolution: true
  simulator: true
  audit: true
  dashboard: true
  billing: true
  identity_providers: true

identity_provider:
  type: okta
  config:
    domain: "vh-test.okta.com"
    api_token: "vh-fake-token"

output_dir: ".validation_harness/output"
resource_prefix: "vh-"
