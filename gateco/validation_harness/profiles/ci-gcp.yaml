profile_name: ci-gcp
provider_mode: native
base_url: "${GATECO_BASE_URL:-http://localhost:8000}"

credentials:
  email: "${GATECO_EMAIL:-admin@acmecorp.com}"
  password: "${GATECO_PASSWORD:-password123}"

connector:
  type: pgvector
  config:
    host: "${PGVECTOR_HOST:-localhost}"
    port: 5432
    database: "${PGVECTOR_DATABASE:-gateco_test}"
    user: "${PGVECTOR_USER:-test}"
    password: "${PGVECTOR_PASSWORD:-test}"
    schema: "public"

features:
  auth: true
  connectors: true
  ingestion: true
  retroactive: true
  policies: true
  retrievals: true
  metadata_resolution: true
  simulator: true
  audit: true
  dashboard: true
  billing: true
  identity_providers: true

identity_provider:
  type: gcp
  config:
    domain: "${GCP_DOMAIN}"
    admin_email: "${GCP_ADMIN_EMAIL}"
    service_account_json: "${GCP_SERVICE_ACCOUNT_JSON}"
  engineering_group: "${GCP_ENGINEERING_GROUP:-engineering}"
  marketing_group: "${GCP_MARKETING_GROUP:-marketing}"

output_dir: ".validation_harness/output"
resource_prefix: "vh-gcp-"
