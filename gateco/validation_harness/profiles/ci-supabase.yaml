profile_name: ci-supabase
provider_mode: emulated_local_postgres
base_url: "${GATECO_BASE_URL:-http://localhost:8000}"

credentials:
  email: "${GATECO_EMAIL:-admin@acmecorp.com}"
  password: "${GATECO_PASSWORD:-password123}"

connector:
  type: supabase
  config:
    host: "${SUPABASE_HOST:-localhost}"
    port: 5432
    database: "${SUPABASE_DATABASE:-gateco_test}"
    user: "${SUPABASE_USER:-test}"
    password: "${SUPABASE_PASSWORD:-test}"
    schema: "public"

features:
  auth: true
  connectors: true
  ingestion: true
  retroactive: true
  policies: true
  retrievals: true
  metadata_resolution: true
  simulator: true
  audit: true
  dashboard: true
  billing: true

output_dir: ".validation_harness/output"
resource_prefix: "vh-ci-"
