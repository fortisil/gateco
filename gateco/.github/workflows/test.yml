name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: gateco_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: apps/backend/requirements.txt

      - name: Install dependencies
        run: |
          cd apps/backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run linting
        run: |
          cd apps/backend
          pip install ruff
          ruff check src/ tests/

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/gateco_test
          JWT_SECRET_KEY: test-jwt-secret-key-for-testing-min-32-chars
          ADMIN_TOKEN: test-admin-token
        run: |
          cd apps/backend
          pytest --cov=src/gateco --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: apps/backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: |
          cd apps/frontend
          npm run lint

      - name: Run type checking
        run: |
          cd apps/frontend
          npm run typecheck || true

      - name: Run tests with coverage
        run: |
          cd apps/frontend
          npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: apps/frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

  website-tests:
    name: Website Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: |
          cd apps/website
          npm run test

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: gateco_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          cd apps/backend
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          cd apps/frontend
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/gateco_test
          JWT_SECRET_KEY: test-jwt-secret-key-for-testing-min-32-chars
          ADMIN_TOKEN: test-admin-token
        run: |
          cd apps/frontend
          npx playwright test --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/
          retention-days: 7

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots
          path: apps/frontend/test-results/
          retention-days: 7

  contract-check:
    name: Contract Check
    runs-on: ubuntu-latest
    needs: [backend-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: apps/backend/requirements.txt

      - name: Install backend dependencies
        run: |
          cd apps/backend
          pip install -r requirements.txt

      - name: Export OpenAPI spec
        run: python packages/contracts/scripts/export-openapi.py

      - name: Check spec is up to date
        run: |
          if ! git diff --exit-code packages/contracts/openapi.json; then
            echo "::error::OpenAPI spec is out of date. Run 'npm run generate -w @gateco/contracts' and commit the result."
            exit 1
          fi

  validation-harness:
    name: Validation Harness
    runs-on: ubuntu-latest
    needs: [backend-tests]

    services:
      postgres:
        image: pgvector/pgvector:0.8.0-pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: gateco_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:v1.12.1
        ports:
          - 6333:6333
          - 6334:6334

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/gateco_test
      JWT_SECRET_KEY: test-jwt-secret-key-for-testing-min-32-chars
      ADMIN_TOKEN: test-admin-token
      DEBUG: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: apps/backend/requirements.txt

      - name: Enable pgvector extension
        run: |
          PGPASSWORD=test psql -h localhost -U test -d gateco_test -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Install Python SDK (editable)
        run: |
          cd packages/sdk-python
          pip install -e .

      - name: Install backend dependencies
        run: |
          cd apps/backend
          pip install -r requirements.txt

      - name: Run migrations
        run: |
          cd apps/backend
          alembic upgrade head

      - name: Seed data
        run: |
          cd apps/backend
          python -m gateco.utils.seed

      - name: Start backend
        run: |
          cd apps/backend
          uvicorn src.gateco.main:app --host 0.0.0.0 --port 8000 &> /tmp/backend.log &
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1 && curl -sf http://localhost:8000/health/db > /dev/null 2>&1; then
              echo "Backend is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Backend failed to start"
              cat /tmp/backend.log
              exit 1
            fi
            sleep 2
          done

      - name: Install validation harness
        run: |
          cd validation_harness
          pip install -e .

      - name: Run pgvector validation (gate)
        run: |
          cd validation_harness
          gateco-validate doctor -p profiles/ci-pgvector.yaml
          timeout 300 gateco-validate run -p profiles/ci-pgvector.yaml --format all

      - name: Run supabase validation
        continue-on-error: true
        run: |
          cd validation_harness
          gateco-validate doctor -p profiles/ci-supabase.yaml
          timeout 300 gateco-validate run -p profiles/ci-supabase.yaml --format all

      - name: Run neon validation
        continue-on-error: true
        run: |
          cd validation_harness
          gateco-validate doctor -p profiles/ci-neon.yaml
          timeout 300 gateco-validate run -p profiles/ci-neon.yaml --format all

      - name: Run qdrant validation
        continue-on-error: true
        run: |
          cd validation_harness
          gateco-validate doctor -p profiles/ci-qdrant.yaml
          timeout 300 gateco-validate run -p profiles/ci-qdrant.yaml --format all

      - name: Run pinecone validation
        continue-on-error: true
        run: |
          if [ -z "$PINECONE_API_KEY" ]; then
            echo "PINECONE_API_KEY not set, skipping pinecone validation"
            exit 0
          fi
          cd validation_harness
          gateco-validate doctor -p profiles/ci-pinecone.yaml
          timeout 300 gateco-validate run -p profiles/ci-pinecone.yaml --format all
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_ENVIRONMENT: ${{ secrets.PINECONE_ENVIRONMENT }}
          PINECONE_INDEX: ${{ secrets.PINECONE_INDEX }}

      - name: Seed Okta test data
        continue-on-error: true
        if: env.OKTA_API_TOKEN != ''
        run: |
          echo "Real-provider sandbox validation (not stub)"
          cd validation_harness
          python scripts/seed_okta.py --domain "$OKTA_DOMAIN" --api-token "$OKTA_API_TOKEN"
        env:
          OKTA_DOMAIN: ${{ secrets.OKTA_DOMAIN }}
          OKTA_API_TOKEN: ${{ secrets.OKTA_API_TOKEN }}

      - name: Run Okta IDP validation
        continue-on-error: true
        if: env.OKTA_API_TOKEN != ''
        run: |
          cd validation_harness
          gateco-validate doctor -p profiles/ci-okta.yaml
          timeout 300 gateco-validate run -p profiles/ci-okta.yaml --format all
        env:
          OKTA_DOMAIN: ${{ secrets.OKTA_DOMAIN }}
          OKTA_API_TOKEN: ${{ secrets.OKTA_API_TOKEN }}

      - name: Teardown Okta test data
        if: always() && env.OKTA_API_TOKEN != ''
        continue-on-error: true
        run: |
          cd validation_harness
          python scripts/seed_okta.py --domain "$OKTA_DOMAIN" --api-token "$OKTA_API_TOKEN" --teardown
        env:
          OKTA_DOMAIN: ${{ secrets.OKTA_DOMAIN }}
          OKTA_API_TOKEN: ${{ secrets.OKTA_API_TOKEN }}

      - name: Generate CI summary
        if: always()
        run: |
          cd validation_harness
          gateco-validate ci-summary

      - name: Upload validation artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-harness-results
          path: |
            validation_harness/.validation_harness/output/
            /tmp/backend.log
          retention-days: 14

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [frontend-tests, website-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build --workspaces --if-present

      - name: Build frontend
        run: |
          cd apps/frontend
          npm run build

      - name: Build website
        run: |
          cd apps/website
          npm run build
