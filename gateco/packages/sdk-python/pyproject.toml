[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "gateco"
version = "0.1.0"
description = "Official Python SDK for the Gateco API"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.26",
    "pydantic>=2.5",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "respx>=0.21",
]

[project.scripts]
gateco = "gateco_sdk.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/gateco_sdk"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
