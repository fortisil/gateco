services:
  frontend:
    build:
      context: apps/frontend
      dockerfile: Dockerfile
      target: production
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8000
    networks:
      - gateco-network

  backend:
    build:
      context: apps/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./apps/backend/.env
    environment:
      - DEBUG=false
      - FRONTEND_URL=http://frontend:80
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/gateco_db
    volumes:
      - backend-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gateco-network

  postgres:
    image: postgres:16-alpine
    container_name: gateco-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=gateco_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gateco-network

networks:
  gateco-network:
    driver: bridge

volumes:
  backend-data:
  postgres-data:
