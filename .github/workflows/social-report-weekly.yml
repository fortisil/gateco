name: Generate Weekly Social Report

on:
  schedule:
    # Run every Monday at 9 AM UTC (4 AM EST)
    - cron: '0 9 * * 1'

  workflow_dispatch:
    inputs:
      week:
        description: 'Week to generate report for (YYYY-Www format, e.g., 2026-W10). Leave empty for previous week.'
        required: false
      dry_run:
        description: 'Dry run - generate report but do not commit'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  REPORT_DIR: gateco/apps/website/content/social/reports/weekly

jobs:
  generate-report:
    name: Generate Weekly Report
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: gateco/apps/website

      - name: Determine week
        id: week
        run: |
          if [ -n "${{ github.event.inputs.week }}" ]; then
            WEEK="${{ github.event.inputs.week }}"
          else
            # Get previous week in ISO format (YYYY-Www)
            WEEK=$(date -d 'last monday' +%G-W%V)
          fi
          echo "week=$WEEK" >> $GITHUB_OUTPUT
          echo "Generating report for week: $WEEK"

      - name: Create reports directory
        run: mkdir -p ${{ env.REPORT_DIR }}

      - name: Generate weekly report
        id: generate
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          WEEK="${{ steps.week.outputs.week }}"
          REPORT_FILE="${{ env.REPORT_DIR }}/${WEEK}.md"

          # Check if report already exists
          if [ -f "$REPORT_FILE" ]; then
            echo "Report for $WEEK already exists, skipping generation"
            echo "skipped=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Generate report using the script
          # If API tokens aren't configured, generate a placeholder report
          if [ -z "$LINKEDIN_ACCESS_TOKEN" ] && [ -z "$TWITTER_BEARER_TOKEN" ]; then
            echo "API tokens not configured, generating placeholder report"

            cat > "$REPORT_FILE" << 'REPORT_EOF'
          # Weekly Social Report: ${{ steps.week.outputs.week }}

          > **Generated:** $(date -u +"%Y-%m-%d %H:%M UTC")
          > **Status:** Placeholder (API tokens not configured)

          ## Executive Summary

          *This is a placeholder report. Configure LinkedIn and Twitter API tokens in repository secrets to generate full analytics reports.*

          ## Configuration Required

          To enable automatic report generation, add the following secrets:

          - `LINKEDIN_ACCESS_TOKEN` - LinkedIn Marketing API access token
          - `TWITTER_BEARER_TOKEN` - Twitter API v2 bearer token
          - `YOUTUBE_API_KEY` - YouTube Data API key (optional)

          ## Manual Data Entry

          If API access is not available, manually update this report with metrics from:

          - [LinkedIn Analytics](https://www.linkedin.com/analytics/)
          - [Twitter Analytics](https://analytics.twitter.com/)
          - [YouTube Studio](https://studio.youtube.com/)

          ## Key Metrics

          | Metric | This Week | Last Week | Change |
          |--------|-----------|-----------|--------|
          | Impressions | - | - | - |
          | Engagements | - | - | - |
          | Engagement Rate | - | - | - |
          | Clicks | - | - | - |
          | Followers Gained | - | - | - |

          ## Platform Highlights

          ### LinkedIn
          *No data available*

          ### Twitter
          *No data available*

          ## Top Performing Content

          *No data available*

          ## Recommendations

          - Configure API tokens to enable automatic reporting
          - Or manually update this file with weekly metrics

          ---
          *Generated automatically by GitHub Actions*
          REPORT_EOF

            # Replace the date in the file
            sed -i "s/\$(date -u +\"%Y-%m-%d %H:%M UTC\")/$(date -u +"%Y-%m-%d %H:%M UTC")/g" "$REPORT_FILE"
          else
            # Run the actual report generation script
            npx tsx scripts/social/generate-weekly-report.ts --week "$WEEK" --output "$REPORT_FILE"
          fi

          echo "report_file=$REPORT_FILE" >> $GITHUB_OUTPUT
          echo "skipped=false" >> $GITHUB_OUTPUT
        working-directory: gateco/apps/website

      - name: Commit report
        if: steps.generate.outputs.skipped != 'true' && github.event.inputs.dry_run != 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(social): add weekly report for ${{ steps.week.outputs.week }}"
          file_pattern: '${{ env.REPORT_DIR }}/*.md'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: Upload report artifact
        if: steps.generate.outputs.skipped != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report-${{ steps.week.outputs.week }}
          path: ${{ steps.generate.outputs.report_file }}
          retention-days: 90

      - name: Report summary
        run: |
          echo "## Weekly Social Report Generation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Week:** ${{ steps.week.outputs.week }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.generate.outputs.skipped }}" = "true" ]; then
            echo "⏭️ Report already exists, skipped generation" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "🔍 Dry run - report generated but not committed" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Report generated and committed" >> $GITHUB_STEP_SUMMARY
          fi

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: generate-report
    if: github.event.inputs.dry_run != 'true'

    steps:
      - name: Notify Slack (optional)
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"📊 Weekly social report generated for week ${{ needs.generate-report.outputs.week }}"}' \
            "$SLACK_WEBHOOK_URL"
